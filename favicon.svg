  <ellipse cx="20" cy="22" rx="10" ry="4" transform="rotate(-30 20 22)" fill="#a8e063"/>
  <ellipse cx="18" cy="32" rx="10" ry="4" transform="rotate(-20 18 32)" fill="#5cba32"/>
  <!-- Leaves right -->
